name: Update badges

on:
  #schedule:
  #  - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Fetch badges and update README
        run: |
          python3 - <<'PYEOF'
          import urllib.request
          import json
          import re
          from playwright.sync_api import sync_playwright, TimeoutError as PWTimeout

          USER = "nilo-lima-jr"

          def is_badges_response(r):
              return "credly.com" in r.url and "badges.json" in r.url and r.status == 200

          # ── 1. Scrape Outro tab via Playwright ────────────────────────────────
          outro_raw = []  # list of badge dicts from the Outro tab

          with sync_playwright() as p:
              browser = p.chromium.launch(
                  headless=True,
                  args=["--no-sandbox", "--disable-setuid-sandbox",
                        "--disable-dev-shm-usage", "--disable-gpu"]
              )
              context = browser.new_context(
                  user_agent=(
                      "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                      "(KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                  )
              )
              page = context.new_page()

              # Navigate — domcontentloaded fires as soon as HTML is parsed (fast)
              print("Navigating to Credly profile...")
              page.goto(
                  f"https://www.credly.com/users/{USER}",
                  wait_until="domcontentloaded",
                  timeout=45000,
              )

              # Wait for the initial badges API call (React bootstraps and calls API)
              try:
                  page.wait_for_response(is_badges_response, timeout=25000)
                  print("Initial badges API call received.")
              except PWTimeout:
                  print("Warning: initial badges API call not captured in time.")

              # Small pause for page to stabilise
              page.wait_for_timeout(1500)

              # Find the Outro/Other tab
              tab_el = None
              for selector in ['[role="tab"]', "button", "li", "a"]:
                  for el in page.query_selector_all(selector):
                      try:
                          text = (el.inner_text() or "").strip()
                          if text.lower() in ("outro", "other", "external"):
                              tab_el = el
                              print(f"Found Outro tab: '{text}'")
                              break
                      except Exception:
                          pass
                  if tab_el:
                      break

              if tab_el:
                  # expect_response is set up BEFORE the click to avoid race conditions
                  try:
                      with page.expect_response(is_badges_response, timeout=20000) as ri:
                          tab_el.click()
                      first_page = ri.value.json()
                      outro_raw.extend(first_page.get("data", []))
                      meta = first_page.get("metadata", {})
                      total_pages = meta.get("total_pages", 1)
                      print(f"Outro tab: page 1/{total_pages}, "
                            f"total={meta.get('total_count', '?')}")

                      # Fetch remaining Outro pages if any
                      next_url = meta.get("next_page_url")
                      p_num = 2
                      while next_url and p_num <= total_pages:
                          req = urllib.request.Request(
                              next_url,
                              headers={"Accept": "application/json",
                                       "User-Agent": "Mozilla/5.0"},
                          )
                          with urllib.request.urlopen(req) as resp:
                              pdata = json.loads(resp.read())
                          outro_raw.extend(pdata.get("data", []))
                          next_url = pdata.get("metadata", {}).get("next_page_url")
                          p_num += 1

                  except PWTimeout:
                      print("Outro tab clicked but no API call captured.")
              else:
                  print("Outro tab not found — skipping.")

              browser.close()

          print(f"Outro raw badges captured: {len(outro_raw)}")

          # ── 2. Credly badges via JSON API (all pages) ─────────────────────────
          credly_badges = []
          credly_ids = set()
          page_num = 1
          while True:
              url = (
                  f"https://www.credly.com/users/{USER}/badges.json"
                  f"?page={page_num}&page_size=48&sort=newest"
              )
              req = urllib.request.Request(
                  url, headers={"Accept": "application/json", "User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              items = data.get("data", [])
              if not items:
                  break
              for b in items:
                  bid = b.get("id", "")
                  credly_ids.add(bid)
                  name = b.get("badge_template", {}).get("name", "Badge")
                  image = b.get("badge_template", {}).get("image", {})
                  img_url = image.get("url", "") if isinstance(image, dict) else str(image)
                  img_url = img_url.replace(
                      "https://images.credly.com/images/",
                      "https://images.credly.com/size/80x80/images/",
                  )
                  credly_badges.append((name, img_url, f"https://www.credly.com/badges/{bid}"))
              meta = data.get("metadata", {})
              if page_num >= meta.get("total_pages", 1):
                  break
              page_num += 1

          print(f"Credly API: {len(credly_badges)} badges")

          # ── 3. Build Outro list (exclude IDs already in Credly set) ──────────
          outro_badges = []
          seen_outro = set()
          for b in outro_raw:
              bid = b.get("id", "")
              if bid in credly_ids or bid in seen_outro:
                  continue
              seen_outro.add(bid)
              name = b.get("badge_template", {}).get("name", "Badge")
              image = b.get("badge_template", {}).get("image", {})
              img_url = image.get("url", "") if isinstance(image, dict) else str(image)
              img_url = img_url.replace(
                  "https://images.credly.com/images/",
                  "https://images.credly.com/size/80x80/images/",
              )
              badge_url = (
                  f"https://www.credly.com/badges/{bid}"
                  if bid
                  else f"https://www.credly.com/users/{USER}/badges"
              )
              outro_badges.append((name, img_url, badge_url))

          print(f"Outro badges (unique, not in Credly): {len(outro_badges)}")

          # ── 4. Combine (Outro first) and write README ─────────────────────────
          lines = [
              f"[![{n}]({i})]({u})"
              for n, i, u in (outro_badges + credly_badges)
          ]
          section = "\n".join(lines)

          with open("README.md") as f:
              content = f.read()

          new_content = re.sub(
              r"(<!--START_SECTION:badges-->).*?(<!--END_SECTION:badges-->)",
              f"\\1\n{section}\n\\2",
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print(
              f"README updated: {len(outro_badges)} Outro + "
              f"{len(credly_badges)} Credly = {len(lines)} total"
          )
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: atualiza badges (Outro + Credly)"
          git push
