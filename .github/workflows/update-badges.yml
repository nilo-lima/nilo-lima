name: Update badges

on:
  #schedule:
  #  - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Fetch badges and update README
        run: |
          python3 - <<'PYEOF'
          import urllib.request
          import json
          import re
          import threading
          from playwright.sync_api import sync_playwright

          USER = "nilo-lima-jr"

          # ── 1. Outro badges via Playwright (intercept network calls) ──────────
          outro_badges = []
          outro_api_data = []
          lock = threading.Lock()

          def intercept(response):
              if "credly.com" in response.url and "badges.json" in response.url:
                  try:
                      data = response.json()
                      if isinstance(data.get("data"), list) and data["data"]:
                          with lock:
                              outro_api_data.append((response.url, data))
                  except Exception:
                      pass

          with sync_playwright() as p:
              browser = p.chromium.launch(
                  headless=True,
                  args=["--no-sandbox", "--disable-setuid-sandbox", "--disable-dev-shm-usage"]
              )
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                             "(KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              )
              page = context.new_page()
              page.on("response", intercept)

              # Load profile — triggers API call for default tab (Credly)
              page.goto(f"https://www.credly.com/users/{USER}", wait_until="load", timeout=60000)
              page.wait_for_timeout(4000)

              # Find and click the "Outro" / "Other" tab
              clicked = False
              for tab in page.query_selector_all('[role="tab"], button, a'):
                  text = (tab.inner_text() or "").strip().lower()
                  if text in ("outro", "other", "external"):
                      tab.click()
                      page.wait_for_timeout(3000)
                      clicked = True
                      break

              if not clicked:
                  # Fallback: try href-based tab links
                  for link in page.query_selector_all("a"):
                      href = link.get_attribute("href") or ""
                      text = (link.inner_text() or "").strip().lower()
                      if "outro" in text or "other" in text or "external" in text:
                          link.click()
                          page.wait_for_timeout(3000)
                          clicked = True
                          break

              browser.close()

          # The intercepted calls include both the initial Credly-tab load
          # and the Outro-tab load after the click.
          # We want the LAST call (Outro tab), identified by having fewer badges
          # than the 90-badge Credly set, or by a different URL pattern.
          # Strategy: collect all intercepted batches and pick the ones NOT
          # already in the Credly API (identified by badge IDs).

          print(f"Intercepted {len(outro_api_data)} API calls from the page")
          for url, data in outro_api_data:
              count = data.get("metadata", {}).get("total_count", "?")
              print(f"  {url[:80]} → total_count={count}")

          # ── 2. Credly badges via JSON API ─────────────────────────────────────
          credly_badges = []
          credly_ids = set()
          page_num = 1
          while True:
              url = (f"https://www.credly.com/users/{USER}/badges.json"
                     f"?page={page_num}&page_size=48&sort=newest")
              req = urllib.request.Request(
                  url, headers={"Accept": "application/json", "User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              items = data.get("data", [])
              if not items:
                  break
              for b in items:
                  bid = b.get("id", "")
                  credly_ids.add(bid)
                  name = b.get("badge_template", {}).get("name", "Badge")
                  image = b.get("badge_template", {}).get("image", {})
                  img_url = image.get("url", "") if isinstance(image, dict) else str(image)
                  img_url = img_url.replace(
                      "https://images.credly.com/images/",
                      "https://images.credly.com/size/80x80/images/"
                  )
                  badge_url = f"https://www.credly.com/badges/{bid}"
                  credly_badges.append((name, img_url, badge_url))
              meta = data.get("metadata", {})
              if page_num >= meta.get("total_pages", 1):
                  break
              page_num += 1

          print(f"Credly API: {len(credly_badges)} badges")

          # ── 3. Extract Outro badges (those NOT in Credly API set) ─────────────
          for url, data in outro_api_data:
              for b in data.get("data", []):
                  bid = b.get("id", "")
                  if bid in credly_ids:
                      continue  # already in Credly set
                  name = b.get("badge_template", {}).get("name", "Badge")
                  image = b.get("badge_template", {}).get("image", {})
                  img_url = image.get("url", "") if isinstance(image, dict) else str(image)
                  img_url = img_url.replace(
                      "https://images.credly.com/images/",
                      "https://images.credly.com/size/80x80/images/"
                  )
                  badge_url = f"https://www.credly.com/badges/{bid}" if bid else f"https://www.credly.com/users/{USER}/badges"
                  outro_badges.append((name, img_url, badge_url))

          print(f"Outro badges found: {len(outro_badges)}")

          # ── 4. Combine (Outro first) and update README ────────────────────────
          all_lines = []
          for name, img, link in (outro_badges + credly_badges):
              all_lines.append(f"[![{name}]({img})]({link})")

          section = "\n".join(all_lines)

          with open("README.md", "r") as f:
              content = f.read()

          new_content = re.sub(
              r"(<!--START_SECTION:badges-->).*?(<!--END_SECTION:badges-->)",
              f"\\1\n{section}\n\\2",
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print(f"README updated: {len(outro_badges)} Outro + {len(credly_badges)} Credly = {len(all_lines)} total")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: atualiza badges (Outro + Credly)"
          git push
