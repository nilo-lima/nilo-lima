name: Update badges

on:
  #schedule:
  #  - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Badges - Readme
        uses: pemtajo/badge-readme@main
        with:
          CREDLY_USER: nilo-lima-jr
          NUMBER_LAST_BADGES: 65 # Aumentado para cobrir todas as medalhas atuais e futuras
          COMMIT_MESSAGE: "chore: expandindo limite de badges para 100"