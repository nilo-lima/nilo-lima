name: Update badges

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Badges - Readme
        uses: pemtajo/badge-readme@main
        with:
          CREDLY_USER: nilo-lima-jr
          # Forçamos um número alto para ele tentar buscar além da primeira aba
          NUMBER_LAST_BADGES: 50
          COMMIT_MESSAGE: "chore: update credly badges"