name: Update badges

on:
  #schedule:
  #  - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch badges and update README
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import re

          user = "nilo-lima-jr"
          badges = []
          page = 1

          while True:
              url = f"https://www.credly.com/users/{user}/badges.json?page={page}&page_size=100&sort=newest"
              req = urllib.request.Request(url, headers={"Accept": "application/json", "User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              items = data.get("data", [])
              if not items:
                  break
              badges.extend(items)
              meta = data.get("metadata", {})
              if page >= meta.get("total_pages", 1):
                  break
              page += 1

          lines = []
          for b in badges:
              name = b.get("badge_template", {}).get("name", "Badge")
              image = b.get("badge_template", {}).get("image", {})
              img_url = image.get("url", "") if isinstance(image, dict) else str(image)
              badge_url = b.get("badge_url") or b.get("id") or ""
              if not badge_url.startswith("http"):
                  badge_url = f"https://www.credly.com/badges/{badge_url}"
              lines.append(f"[![{name}]({img_url})]({badge_url})")

          section = "\n".join(lines)

          with open("README.md", "r") as f:
              content = f.read()

          new_content = re.sub(
              r"(<!--START_SECTION:badges-->).*?(<!--END_SECTION:badges-->)",
              f"\\1\n{section}\n\\2",
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print(f"Updated README with {len(lines)} badges.")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: atualiza badges do Credly"
          git push
